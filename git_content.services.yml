services:

  # --- Shared infrastructure ---

  git_content.field_discovery:
    class: Drupal\git_content\Discovery\FieldDiscovery
    arguments: ['@entity_type.manager', '@entity_field.manager']

  git_content.serializer:
    class: Drupal\git_content\Serializer\MarkdownSerializer

  # --- Exporters ---

  git_content.node_exporter:
    class: Drupal\git_content\Exporter\NodeExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  git_content.taxonomy_exporter:
    class: Drupal\git_content\Exporter\TaxonomyExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  git_content.file_exporter:
    class: Drupal\git_content\Exporter\FileExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  git_content.user_exporter:
    class: Drupal\git_content\Exporter\UserExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  git_content.menu_link_exporter:
    class: Drupal\git_content\Exporter\MenuLinkExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  git_content.block_content_exporter:
    class: Drupal\git_content\Exporter\BlockContentExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  git_content.media_exporter:
    class: Drupal\git_content\Exporter\MediaExporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@logger.factory']

  # --- Exporter orchestrator ---

  git_content.exporter:
    class: Drupal\git_content\Exporter\MarkdownExporter
    arguments:
      - '@entity_type.manager'
      - '@logger.factory'
      - '@git_content.node_exporter'
      - '@git_content.taxonomy_exporter'
      - '@git_content.media_exporter'
      - '@git_content.file_exporter'
      - '@git_content.user_exporter'
      - '@git_content.block_content_exporter'
      - '@git_content.menu_link_exporter'

  # --- Importers ---

  git_content.node_importer:
    class: Drupal\git_content\Importer\NodeImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.taxonomy_importer:
    class: Drupal\git_content\Importer\TaxonomyImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.media_importer:
    class: Drupal\git_content\Importer\MediaImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.file_entity_importer:
    class: Drupal\git_content\Importer\FileEntityImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.user_importer:
    class: Drupal\git_content\Importer\UserImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.block_content_importer:
    class: Drupal\git_content\Importer\BlockContentImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.menu_link_importer:
    class: Drupal\git_content\Importer\MenuLinkImporter
    arguments: ['@git_content.field_discovery', '@git_content.serializer', '@entity_type.manager', '@uuid', '@password_generator', '@datetime.time', '@logger.factory', '@current_user']

  git_content.importer:
    class: Drupal\git_content\Importer\MarkdownImporter
    arguments:
      - '@git_content.serializer'
      - '@entity_type.manager'
      - '@current_user'
      - '@logger.factory'
      - '@git_content.node_importer'
      - '@git_content.taxonomy_importer'
      - '@git_content.media_importer'
      - '@git_content.file_entity_importer'
      - '@git_content.user_importer'
      - '@git_content.block_content_importer'
      - '@git_content.menu_link_importer'

  # --- Drush commands ---

  git_content.commands:
    class: Drupal\git_content\Commands\GitContentCommands
    arguments:
      - '@git_content.exporter'
      - '@git_content.importer'
    tags:
      - { name: drush.command }
