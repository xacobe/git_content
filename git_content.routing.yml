git_content.export:
  path: '/git-content/export'
  defaults:
    _form: '\Drupal\git_content\Form\ExportForm'
    _title: 'Git Content Export'
  requirements:
    _permission: 'administer site configuration'

git_content.import:
  path: '/git-content/import'
  defaults:
    _form: '\Drupal\git_content\Form\ImportForm'
    _title: 'Git Content Import'
  requirements:
    _permission: 'administer site configuration'